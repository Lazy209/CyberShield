{% extends "base.html" %}
{% from "layout_sidebar.html" import sidebar %}
{% block title %}Phishing URL Detector — CyberShield{% endblock %}
{% block body %}
<div class="app-layout">
  {{ sidebar(user, 'url') }}
  <main class="main-content">
    <header class="page-header"><h1>🔗 Phishing URL Detector</h1><p>Detect suspicious URLs, brand impersonation, and phishing indicators</p></header>
    <div class="panel">
      <form id="scan-form" data-endpoint="/api/scan/url">
        <label>Enter URL to analyze</label>
        <input type="url" name="url" id="scan-input" placeholder="https://example.com/login" required>
        <button type="submit" class="btn">Analyze URL</button>
      </form>
      <div id="scan-results" class="results-area hidden"></div>
    </div>
  </main>
</div>
{% endblock %}
