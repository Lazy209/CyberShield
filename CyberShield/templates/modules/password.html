{% extends "base.html" %}
{% from "layout_sidebar.html" import sidebar %}
{% block title %}Password Analyzer — CyberShield{% endblock %}
{% block body %}
<div class="app-layout">
  {{ sidebar(user, 'password') }}
  <main class="main-content">
    <header class="page-header"><h1>🔑 Password Analyzer</h1><p>Check password strength, entropy, and common-password risks</p></header>
    <div class="panel">
      <form id="scan-form" data-endpoint="/api/scan/password">
        <label>Enter password to analyze</label>
        <input type="password" name="password" id="scan-input" placeholder="Type a password..." required>
        <button type="submit" class="btn">Analyze Password</button>
      </form>
      <div id="scan-results" class="results-area hidden"></div>
    </div>
  </main>
</div>
{% endblock %}
