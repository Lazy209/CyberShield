{% extends "base.html" %}
{% from "layout_sidebar.html" import sidebar %}
{% block title %}Log Analyzer — CyberShield{% endblock %}
{% block body %}
<div class="app-layout">
  {{ sidebar(user, 'logs') }}
  <main class="main-content">
    <header class="page-header"><h1>📋 Log Analyzer</h1><p>Detect suspicious patterns in server and security logs</p></header>
    <div class="panel">
      <form id="log-form">
        <label>Paste log content</label>
        <textarea name="log_text" id="scan-input" rows="10" placeholder="Paste log lines here..."></textarea>
        <label>Or upload log file</label>
        <input type="file" name="file" id="log-file" accept=".log,.txt">
        <button type="submit" class="btn">Analyze Logs</button>
      </form>
      <div id="scan-results" class="results-area hidden"></div>
    </div>
  </main>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('log-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData();
  const file = document.getElementById('log-file').files[0];
  if (file) { fd.append('file', file); }
  else { fd.append('log_text', document.getElementById('scan-input').value); }
  const res = await fetch('/api/scan/logs', { method: 'POST', body: fd });
  const data = await res.json();
  CyberShield.renderResults(data, document.getElementById('scan-results'));
});
</script>
{% endblock %}
